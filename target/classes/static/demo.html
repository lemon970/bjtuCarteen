<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>仿真异步接口 Demo</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: #172033;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      background: #f5f7fb;
    }

    main {
      width: min(1120px, calc(100vw - 32px));
      margin: 24px auto;
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 16px;
    }

    section {
      background: #fff;
      border: 1px solid #d9e1ee;
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 10px 28px rgba(23, 32, 51, 0.07);
    }

    h1 {
      grid-column: 1 / -1;
      margin: 0;
      font-size: 24px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 16px;
    }

    textarea {
      width: 100%;
      min-height: 390px;
      padding: 12px;
      resize: vertical;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font: 13px/1.55 Consolas, "Courier New", monospace;
    }

    button {
      height: 36px;
      padding: 0 14px;
      border: 0;
      border-radius: 6px;
      color: #fff;
      background: #155bd5;
      cursor: pointer;
      font-weight: 600;
    }

    button:disabled {
      cursor: not-allowed;
      background: #95a3b8;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .metric {
      padding: 10px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      background: #f8fafc;
    }

    .metric span {
      display: block;
      color: #64748b;
      font-size: 12px;
    }

    .metric strong {
      display: block;
      margin-top: 5px;
      font-size: 18px;
    }

    pre {
      min-height: 220px;
      max-height: 480px;
      overflow: auto;
      padding: 12px;
      border-radius: 6px;
      background: #111827;
      color: #e5e7eb;
      font: 12px/1.55 Consolas, "Courier New", monospace;
      white-space: pre-wrap;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th,
    td {
      padding: 8px;
      border-bottom: 1px solid #e2e8f0;
      text-align: right;
    }

    th:first-child,
    td:first-child {
      text-align: left;
    }

    @media (max-width: 860px) {
      main {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<main>
  <h1>仿真异步接口 Demo</h1>

  <section>
    <h2>请求配置</h2>
    <textarea id="config"></textarea>
    <div class="toolbar">
      <button id="runBtn">异步运行</button>
      <button id="timelineBtn" disabled>拉取 timeline 第 1 页</button>
    </div>
  </section>

  <section>
    <h2>任务状态</h2>
    <div class="grid">
      <div class="metric"><span>task_id</span><strong id="taskId">-</strong></div>
      <div class="metric"><span>status</span><strong id="status">-</strong></div>
      <div class="metric"><span>report_id</span><strong id="reportId">-</strong></div>
      <div class="metric"><span>arrived</span><strong id="arrived">-</strong></div>
      <div class="metric"><span>served</span><strong id="served">-</strong></div>
      <div class="metric"><span>avg wait</span><strong id="wait">-</strong></div>
    </div>
    <pre id="log"></pre>
  </section>

  <section style="grid-column: 1 / -1;">
    <h2>timeline 分页结果</h2>
    <table>
      <thead>
      <tr>
        <th>minute</th>
        <th>total queue</th>
        <th>occupied seats</th>
        <th>arrived</th>
        <th>served</th>
      </tr>
      </thead>
      <tbody id="timelineRows"></tbody>
    </table>
  </section>
</main>

<script>
  const defaultConfig = {
    simulationName: "frontend-demo",
    duration: 0.2,
    arrivalRate: 120,
    queueLimit: 10,
    packProbability: 0.2,
    seed: 20260502,
    baseConfig: {
      windowCount: 3,
      takeawayWindowCount: 1,
      takeawayServiceTimeMultiplier: 1.15,
      totalSeats: 40,
      totalStudents: 0,
      numFourSeatTables: 6,
      numTwoSeatTables: 8
    },
    weatherConfig: {
      currentWeather: "sunny",
      weatherImpactFactor: 1.0
    },
    randomBounds: {
      arrivalInterval: 0,
      serviceRange: [60, 120],
      diningRange: [600, 900],
      preferenceRange: [0.1, 0.3]
    },
    peakConfig: {
      classPeakEnabled: true,
      classPeakWindows: [
        {startMinute: 3, endMinute: 8, multiplier: 4.0},
        {startMinute: 7, endMinute: 12, multiplier: 3.0}
      ]
    }
  };

  const el = (id) => document.getElementById(id);
  let currentTaskId = "";
  let currentReportId = "";
  let eventSource = null;

  el("config").value = JSON.stringify(defaultConfig, null, 2);
  el("runBtn").addEventListener("click", submitAsyncRun);
  el("timelineBtn").addEventListener("click", loadTimeline);

  async function submitAsyncRun() {
    closeStream();
    resetOutput();
    el("runBtn").disabled = true;

    try {
      const config = JSON.parse(el("config").value);
      const response = await fetch("/api/simulation/run/async", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(config)
      });
      const payload = await response.json();
      if (!response.ok || payload.code !== 0) {
        throw new Error(payload.message || "submit failed");
      }

      applySnapshot(payload.data);
      appendLog("submitted", payload.data);
      openStream(payload.data.task_id);
    } catch (error) {
      appendLog("error", {message: error.message});
      el("runBtn").disabled = false;
    }
  }

  function openStream(taskId) {
    eventSource = new EventSource(`/api/simulation/task/${taskId}/stream`);
    eventSource.addEventListener("status", (event) => {
      const snapshot = JSON.parse(event.data);
      applySnapshot(snapshot);
      appendLog("status", snapshot);
      if (snapshot.status === "COMPLETED" || snapshot.status === "FAILED") {
        closeStream();
        el("runBtn").disabled = false;
      }
    });
    eventSource.onerror = () => {
      appendLog("stream", {message: "SSE disconnected"});
      closeStream();
      el("runBtn").disabled = false;
    };
  }

  async function loadTimeline() {
    if (!currentReportId) {
      return;
    }
    const response = await fetch(`/api/simulation/report/${currentReportId}/timeline?page=1&page_size=20`);
    const payload = await response.json();
    if (!response.ok || payload.code !== 0) {
      appendLog("timeline error", payload);
      return;
    }
    renderTimeline(payload.data.items || []);
    appendLog("timeline page", payload.data);
  }

  function applySnapshot(snapshot) {
    currentTaskId = snapshot.task_id || currentTaskId;
    currentReportId = snapshot.report_id || currentReportId;
    el("taskId").textContent = currentTaskId || "-";
    el("status").textContent = snapshot.status || "-";
    el("reportId").textContent = currentReportId || "-";
    el("timelineBtn").disabled = !snapshot.report_available;

    const summary = snapshot.summary || {};
    el("arrived").textContent = value(summary.arrived_count);
    el("served").textContent = value(summary.served_count);
    el("wait").textContent = summary.avg_wait_time_minutes == null
      ? "-"
      : `${Number(summary.avg_wait_time_minutes).toFixed(2)} min`;
  }

  function renderTimeline(items) {
    el("timelineRows").innerHTML = items.map((item) => `
      <tr>
        <td>${value(item.minute)}</td>
        <td>${value(item.total_queue_size)}</td>
        <td>${value(item.occupied_seats)}</td>
        <td>${value(item.arrived_count)}</td>
        <td>${value(item.served_count)}</td>
      </tr>
    `).join("");
  }

  function appendLog(label, data) {
    const line = `[${new Date().toLocaleTimeString()}] ${label}\n${JSON.stringify(data, null, 2)}\n\n`;
    el("log").textContent = line + el("log").textContent;
  }

  function resetOutput() {
    currentTaskId = "";
    currentReportId = "";
    ["taskId", "status", "reportId", "arrived", "served", "wait"].forEach((id) => el(id).textContent = "-");
    el("timelineRows").innerHTML = "";
    el("log").textContent = "";
    el("timelineBtn").disabled = true;
  }

  function closeStream() {
    if (eventSource) {
      eventSource.close();
      eventSource = null;
    }
  }

  function value(input) {
    return input == null ? "-" : input;
  }
</script>
</body>
</html>
