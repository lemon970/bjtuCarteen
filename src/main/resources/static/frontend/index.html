<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>食堂高峰客流仿真系统</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #eef2f5;
        color: #18212f;
        font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", system-ui, sans-serif;
      }

      main {
        width: min(720px, calc(100vw - 32px));
        border: 1px solid #d8e0e8;
        border-radius: 8px;
        background: #ffffff;
        padding: 28px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }

      p {
        color: #607086;
        line-height: 1.7;
      }

      code,
      a {
        color: #2368a2;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>食堂高峰客流仿真系统</h1>
      <p>当前后端服务已启动。实时 React 界面请进入 <code>sun</code> 目录运行 <code>npm run dev</code>，然后访问 <a href="http://localhost:5173/">http://localhost:5173/</a>。</p>
      <p>如需将前端集成进 Spring Boot 静态目录，请在本机允许写入后运行 <code>npm run build:backend</code>。</p>
    </main>
  </body>
</html>
